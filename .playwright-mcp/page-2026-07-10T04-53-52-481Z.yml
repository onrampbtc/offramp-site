              - generic [ref=f145e140]: Once the sale is complete and payment details have been provided, we collect payment from the buyer for your valuables and start processing your payment. As these are professional buyers, this can typically take anywhere from 9-14 business days before we issue the payment to you. We will always work as hard as we can to ensure you are paid as quickly as possible.
